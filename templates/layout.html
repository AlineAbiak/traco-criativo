<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Traço Criativo</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial;
        }

        body{
            display:flex;
            background:#f5f5f5;
        }

        .sidebar{
            width:250px;
            height:100vh;
            background:#C5F2E0;
            position:fixed;
            padding:20px;
            display:flex;
            flex-direction:column;
            justify-content:space-between;
        }

        .logo{
            font-size:28px;
            font-weight:bold;
            margin-bottom:40px;
        }

        .menu a{
            display:block;
            padding:15px;
            text-decoration:none;
            color:black;
            margin-bottom:10px;
            border-radius:10px;
            background:white;
        }

        .menu a:hover{
            background:#a9e7d0;
        }

        .content{
            margin-left:270px;
            width:100%;
            padding:30px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:20px;
            margin-bottom:30px;
        }

        .card{
            padding:20px;
            border-radius:20px;
            color:black;
            font-weight:bold;
            box-shadow:0px 3px 10px rgba(0,0,0,0.1);
        }

        .table{
            width:100%;
            background:white;
            border-radius:20px;
            overflow:hidden;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th, td{
            padding:15px;
            text-align:left;
        }

        th{
            background:#f0f0f0;
        }

        tr:nth-child(even){
            background:#fafafa;
        }

        .btn{
            padding:10px 15px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            text-decoration:none;
        }

        .btn-green{
            background:#C5F2E0;
        }

        .btn-red{
            background:#ff5c5c;
            color:white;
        }

        .form-box{
            background:white;
            padding:30px;
            border-radius:20px;
            width:400px;
        }

        input, select{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:20px;
            border-radius:10px;
            border:1px solid #ccc;
        }

    </style>
</head>
<body>

<div class="sidebar">

    <div>

        <div class="logo">
             Traço Criativo
        </div>

        <div class="menu">
            <a href="/dashboard"><i class="fa fa-chart-line"></i> Home</a>
            <a href="/produtos"><i class="fa fa-box"></i> Estoque</a>
            <a href="/vendas"><i class="fa fa-cart-shopping"></i> Vendas</a>
            <a href="/clientes"><i class="fa fa-user"></i> Clientes</a>
            <a href="/cadastrar"><i class="fa fa-plus"></i> Cadastrar</a>
        </div>

    </div>

    <div>
        <p> Administrador (Logado)</p>
        <br>
        <a href="/logout" class="btn btn-red">Sair</a>
    </div>

</div>

<div class="content">

{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for message in messages %}
            <p style="margin-bottom:20px; color:red;">
                {{ message }}
            </p>
        {% endfor %}
    {% endif %}
{% endwith %}

{% block content %}
{% endblock %}

</div>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
    var socket = io();

    socket.on("atualizar_grafico", function() {
        location.reload();
    });
</script>
</body>
</html>

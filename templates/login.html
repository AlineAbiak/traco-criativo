<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#C5F2E0;
            font-family:Arial;
        }

        .login-box{
            background:white;
            padding:40px;
            border-radius:20px;
            width:350px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:20px;
            border-radius:10px;
            border:1px solid #ccc;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#93FFF5;
            cursor:pointer;
            font-weight:bold;
        }

    </style>
</head>
<body>

<div class="login-box">

    <h1>Traço Criativo</h1>

    <form method="POST">

        <input type="text" name="usuario" placeholder="Usuário">

        <input type="password" name="senha" placeholder="Senha">

        <button type="submit">Entrar</button>

    </form>

</div>

</body>
</html>
